name: Create Release

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' . hipaypayments/
          mkdir -p dist
          zip -r dist/hipaypayments.zip hipaypayments/
          rm -rf hipaypayments/

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ github.ref_name }}
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HiPay Payments ${{ github.ref_name }}
          target_commitish: ps1.7
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/hipaypayments.zip

